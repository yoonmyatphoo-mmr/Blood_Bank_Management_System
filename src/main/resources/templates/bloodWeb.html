    <style>
        #navbar {
            position: sticky;
            top: 0;
        }

        #left {
            float: left;
            width: 300px;
            height: 1200px;
            background-color: black;
        }

        #right {
           /* th:style = "'background-image: url(images/form-v9.jpg)'";
            background-image: url(static/images/blood.jpg);*/
            background-size: cover;
            height: 1200px;
        }

        #nav{
            height:35%;
        }

        #nav a:link {
            color: gray;
        }

        /*img{width: 50px; height:50px;}*/
        a {
            font-size: 1.2em;
        }

        #nav a:visited {
            color: gray;
        }

        #nav a:hover {
            color: white;
        }

        #nav i:hover {
            color: blue;
        }

        #nav a {
            text-decoration: none;
            display: block;
        }

        #cir {
            border-radius: 50%;
            padding: 20px 30px 20px 30px;
            width: 130px;
            height: 90px;
        }

        figcaption {
            color: white;
            font-size: 2em;
        }

        #i {
            color: gray;
            font-size: 30px;
            padding-left: 0.5em;
        }

        #li {
            height: 5vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-right: 40px;
        }

        ul li {
            width: 30px;
            height: 30px;
            background-color: gray;
            border: 2px solid gray;
            margin: 7px;
            list-style: none;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;


        }

        ul li i {
            color: white;

        }

        ul li:before {
            content: "";
            position: absolute;
            width: inherit;
            height: inherit;
            background-color: blue;
            border-radius: 50%;
            transtion: all 0.3s linear;
            z-index: -1;
            opacity: 0;
        }

        ul li:hover:before {
            transform: scale(0.8);
            opacity: 1;

        }

        ul li:hover i {
            color: blue;
        }

        ul {
            display: flex;
        }
